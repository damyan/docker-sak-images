name: Build and Publish Docker Image

on:
  workflow_call:
    inputs:
      image:
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
        - os: ubuntu-latest
          arch: linux/amd64
        - os: ubuntu-24.04-arm
          arch: linux/arm64
    runs-on: ${{ matrix.platform.os }}
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha }}
    - uses: docker/metadata-action@v6
      id: meta
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/sak-${{ inputs.image }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GHCR
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push by digest
      id: build
      timeout-minutes: 100
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.image }}
        platforms: ${{ matrix.platform.arch }}
        pull: true
        labels: ${{ steps.meta.outputs.labels }}
        outputs: type=image,"name=ghcr.io/${{ github.repository_owner }}/sak-${{ inputs.image }}",push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
        secrets: |
          "github_pat=${{ secrets.GITHUB_TOKEN }}"
    - name: Export digest
      if: github.event_name != 'pull_request'
      run: |
        mkdir -p ${{ runner.temp }}/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "${{ runner.temp }}/digests/${digest#sha256:}"
    - name: Upload digest
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ inputs.image }}-${{ matrix.platform.os }}
        path: ${{ runner.temp }}/digests/*
        if-no-files-found: error
        retention-days: 1

  merge:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: build
    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-${{ inputs.image }}-*
        merge-multiple: true
    - uses: docker/metadata-action@v6
      id: meta
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/sak-${{ inputs.image }}
        tags: |
          type=semver,pattern={{version}}
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
          type=sha
          type=raw,value=latest,enable={{ is_default_branch }}
        flavor: |
          latest=auto
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Create manifest list and push
      working-directory: ${{ runner.temp }}/digests
      run: |
        docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
          $(printf 'ghcr.io/${{ github.repository_owner }}/sak-${{ inputs.image }}@sha256:%s ' *)
    - name: Inspect image
      run: |
        docker buildx imagetools inspect ghcr.io/${{ github.repository_owner }}/sak-${{ inputs.image }}:${{ steps.meta.outputs.version }}
